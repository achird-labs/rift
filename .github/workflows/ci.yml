name: CI

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --workspace --all-features --lib

      # Issue #344: a pinned cbindgen so the header regenerate-diff in the smoke test is
      # deterministic (cbindgen output varies across versions) and actually runs (the step
      # skips the diff when cbindgen is absent). Keep the version in sync with the header's.
      - name: Install cbindgen (pinned)
        run: cargo install cbindgen --version 0.29.4 --locked

      # Issue #205/#343: prove the librift_ffi cdylib builds and exports the full C-ABI (v1+v2),
      # and that the checked-in header matches, before the per-platform release matrix relies on it.
      - name: rift-ffi C-ABI smoke test
        run: ./scripts/verify-ffi-cdylib.sh

  # Issue #420: the truststore keytool tests are #[ignore]d (they need a JDK on PATH), so the
  # matrix `test` job never runs them and the PKCS#12/JKS JVM-loadability guarantee has no CI
  # enforcement — a regression that breaks the container structure (e.g. dropping the Oracle
  # TrustedKeyUsage attribute added in #417) would pass CI green. This job installs a JDK and runs
  # them. --no-default-features avoids the Redis system deps the truststore module doesn't use.
  jvm-truststore:
    name: JVM Truststore Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-jvm-truststore-${{ hashFiles('**/Cargo.lock') }}

      # keytool proves real JVM interop (KeyStore.load surfacing a trustedCertEntry), which the
      # pure-Rust structural tests cannot.
      - name: Run JVM truststore integration tests
        run: cargo test -p rift-core --no-default-features --lib proxy::truststore -- --ignored

  docs-coverage:
    name: Docs Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Issue #280 (Section E): fail if a CLI flag / env var / subcommand exists in code but
      # isn't documented under docs/. --self-test first proves the checker isn't a no-op.
      - name: Verify docs cover the CLI/env reference surface
        run: |
          ./scripts/verify-docs-coverage.sh --self-test
          ./scripts/verify-docs-coverage.sh

  ffi-manifest:
    name: FFI Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Issue #459: prove the ffi-manifest.json generator (the release asset SDK consumers read to
      # resolve librift_ffi cdylibs) works and isn't a no-op, on every PR — so it can't silently
      # rot before the release workflow runs it for real.
      - name: Verify ffi-manifest generator
        run: ./scripts/gen-ffi-manifest.sh --self-test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-features --release

  redis-integration:
    name: Redis Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Redis integration tests
        run: cargo test --package rift-http-proxy --test redis_backend --all-features

  compatibility-test:
    name: Compatibility Tests
    runs-on: ubuntu-latest
    # Only run on pull requests to master/main
    if: github.event_name == 'pull_request'
    needs: [test, lint, build]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start test environment
        working-directory: tests/compatibility
        run: |
          docker compose up -d --build --wait
          # Wait for both services to be healthy
          echo "Waiting for services to be healthy..."
          for i in {1..30}; do
            mb_health=$(docker inspect --format='{{.State.Health.Status}}' mb-original 2>/dev/null || echo "not ready")
            rift_health=$(docker inspect --format='{{.State.Health.Status}}' rift-proxy 2>/dev/null || echo "not ready")
            echo "  Mountebank: $mb_health, Rift: $rift_health"
            if [ "$mb_health" = "healthy" ] && [ "$rift_health" = "healthy" ]; then
              echo "Both services are healthy!"
              break
            fi
            sleep 2
          done

      - name: Run shared compatibility tests (Rift + Mountebank)
        working-directory: tests/compatibility
        run: cargo test --test compatibility --release
        env:
          RUST_LOG: info

      - name: Run Rift-only feature tests
        working-directory: tests/compatibility
        run: cargo test --test rift_only --release
        env:
          RUST_LOG: info

      - name: Show container logs on failure
        if: failure()
        working-directory: tests/compatibility
        run: |
          echo "=== Mountebank logs ==="
          docker logs mb-original --tail 100
          echo ""
          echo "=== Rift logs ==="
          docker logs rift-proxy --tail 100

      - name: Stop test environment
        if: always()
        working-directory: tests/compatibility
        run: docker compose down -v
