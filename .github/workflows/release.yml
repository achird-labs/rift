name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip actual publishing)'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: rift

jobs:
  # =============================================================================
  # Build binaries for all platforms
  # =============================================================================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc)
          # `classifier` names the librift_ffi cdylib asset by os/arch for the JVM loader (#205).
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            features: javascript,redis-backend
            classifier: linux-x86_64

          # Linux ARM64 (glibc)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            features: javascript,redis-backend
            no_default_features: true
            cross: true
            classifier: linux-aarch64

          # Linux x86_64 (musl - static binary)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            features: javascript,redis-backend
            no_default_features: true
            cross: true
            classifier: linux-x86_64-musl

          # Linux ARM64 (musl - static binary)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            features: javascript,redis-backend
            no_default_features: true
            cross: true
            classifier: linux-aarch64-musl

          # macOS x86_64 (Intel) - cross-compiled on ARM64 runner
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            features: javascript,redis-backend
            no_default_features: true
            classifier: darwin-x86_64

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            features: javascript,redis-backend
            classifier: darwin-aarch64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            features: javascript,redis-backend
            no_default_features: true
            classifier: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Update Cargo.toml version
        shell: bash
        run: |
          # Extract version number (remove 'v' prefix if present)
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          echo "Setting version to: $VERSION"
          # Update workspace version in root Cargo.toml
          sed -i.bak 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak
          # Keep internal path-dependency version requirements in lockstep (issue #474). The build
          # bumps the workspace version, so every internal crate becomes $VERSION; a `path = "../rift-*",
          # version = "..."` requirement left at the old version can no longer resolve the now-$VERSION
          # path crate and `cargo build` fails. Bump the `version = "..."` that follows each internal
          # path dep so the requirement matches. (Mirrors the publish job — must run here too, else the
          # build fails before publish is ever reached.)
          #
          # Use the attached-suffix `-i.bak` form: this job's matrix includes macOS runners whose BSD
          # sed does not accept the GNU space-separated `-i -E` (no suffix) form — it would leave the
          # files un-edited and trip the assertion below. `-i.bak` works on both GNU and BSD sed (the
          # workspace-version line above relies on the same form). Clean up the backups afterward.
          find crates -name Cargo.toml -exec sed -i.bak -E \
            's|(path = "\.\./rift-[a-z-]+", version = ")[^"]*|\1'"$VERSION"'|g' {} +
          find crates -name 'Cargo.toml.bak' -delete
          # Verify the change
          grep 'version = ' Cargo.toml | head -1
          grep -R 'path = "\.\./rift-' crates/*/Cargo.toml || true
          # Assert the lockstep bump covered every internal path dep: sed exits 0 even on no match,
          # so a reformatted dep line could silently keep a stale version and break the build.
          STALE=$(grep -RE 'path = "\.\./rift-[a-z-]+"' crates/*/Cargo.toml \
            | grep 'version = "' | grep -v "version = \"$VERSION\"" || true)
          if [ -n "$STALE" ]; then
            echo "::error::internal dependency version(s) not bumped to $VERSION:"
            echo "$STALE"
            exit 1
          fi

      # Select Xcode 15.x to avoid ring 0.17.14 compilation issues with Xcode 16.x
      - name: Select Xcode (macOS 14)
        if: matrix.os == 'macos-14'
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (non-musl)
        if: matrix.cross && !contains(matrix.target, 'musl')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross (for musl targets)
        if: matrix.cross && contains(matrix.target, 'musl')
        uses: taiki-e/install-action@cross

      - name: Install pkg-config (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install pkg-config

      # Cache
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      # Build
      - name: Build release binaries
        shell: bash
        run: |
          # Build feature flags for rift-http-proxy
          FEATURE_FLAGS="--features ${{ matrix.features }}"
          if [ "${{ matrix.no_default_features }}" = "true" ]; then
            FEATURE_FLAGS="--no-default-features $FEATURE_FLAGS"
          fi

          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            # Use cross for musl targets (provides proper toolchain in Docker)
            cross build --release --package rift-http-proxy --target ${{ matrix.target }} $FEATURE_FLAGS
            cross build --release --package rift-lint --target ${{ matrix.target }}
            cross build --release --package rift-tui --target ${{ matrix.target }}
            # librift_ffi cdylib for musl (issue #463): a cdylib is a dynamic `.so`, but musl
            # defaults to `crt-static` (correct for the static binaries above), under which a
            # cdylib can't be produced. Build rift-ffi in a SEPARATE invocation with crt-static
            # OFF — scoped to this crate so the binaries stay static — yielding a `.so` that links
            # against Alpine's musl libc. Enables embedded SDK tests on Alpine CI images.
            # Scoped to x86_64: that's the lane the issue targets and the one the `musl cdylib`
            # PR-CI job validates; an aarch64-musl cdylib has no PR-time gate, so it's not shipped
            # (it would only surface a link failure at release time).
            if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
              RUSTFLAGS="-C target-feature=-crt-static" \
                cross build --release --package rift-ffi --target ${{ matrix.target }} $FEATURE_FLAGS
            fi
          else
            cargo build --release --package rift-http-proxy --target ${{ matrix.target }} $FEATURE_FLAGS
            cargo build --release --package rift-lint --target ${{ matrix.target }}
            cargo build --release --package rift-tui --target ${{ matrix.target }}
            cargo build --release --package rift-ffi --target ${{ matrix.target }} $FEATURE_FLAGS
          fi

      # Package
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          # Create archive directory
          ARCHIVE_NAME="${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE_NAME/bin"

          # Copy main binary (rift-http-proxy as 'rift')
          cp rift-http-proxy "$ARCHIVE_NAME/bin/${{ env.BINARY_NAME }}"
          chmod +x "$ARCHIVE_NAME/bin/${{ env.BINARY_NAME }}"

          # Copy additional binaries
          cp rift-lint "$ARCHIVE_NAME/bin/rift-lint"
          chmod +x "$ARCHIVE_NAME/bin/rift-lint"
          cp rift-tui "$ARCHIVE_NAME/bin/rift-tui"
          chmod +x "$ARCHIVE_NAME/bin/rift-tui"
          cp rift-verify "$ARCHIVE_NAME/bin/rift-verify"
          chmod +x "$ARCHIVE_NAME/bin/rift-verify"

          # Copy docs
          cp ../../../README.md "$ARCHIVE_NAME/" 2>/dev/null || true
          cp ../../../LICENSE "$ARCHIVE_NAME/" 2>/dev/null || true
          cp ../../../CHANGELOG.md "$ARCHIVE_NAME/" 2>/dev/null || true

          # Create archive
          tar -czvf "$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"

          # Create checksum
          shasum -a 256 "$ARCHIVE_NAME.tar.gz" > "$ARCHIVE_NAME.tar.gz.sha256"

          echo "ASSET_PATH=target/${{ matrix.target }}/release/$ARCHIVE_NAME.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=$ARCHIVE_NAME.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM_PATH=target/${{ matrix.target }}/release/$ARCHIVE_NAME.tar.gz.sha256" >> $GITHUB_ENV
          echo "CHECKSUM_NAME=$ARCHIVE_NAME.tar.gz.sha256" >> $GITHUB_ENV

          # rift-ffi cdylib as a standalone, classifier-named release asset (issue #205): the JVM
          # embedded backend loads the raw library by os/arch, so it ships outside the binary tarball.
          # x86_64 musl now builds a crt-static-off cdylib (issue #463); the classifier carries the
          # `-musl` suffix, so it's distinct from the gnu asset. aarch64 musl has no cdylib lane
          # (no PR-CI gate) — the build step produces no librift_ffi there, so skip packaging it.
          if [[ "${{ matrix.target }}" != "aarch64-unknown-linux-musl" ]]; then
            if [[ "$OSTYPE" == "darwin"* ]]; then EXT="dylib"; else EXT="so"; fi
            FFI_NAME="librift_ffi-${{ matrix.classifier }}.$EXT"
            cp "librift_ffi.$EXT" "$FFI_NAME"
            # Issue #469: fail the release if the cdylib dynamically links a non-stock library
            # (e.g. system LuaJIT) — that made the v0.11.3 artifacts fail to dlopen on stock hosts.
            "$GITHUB_WORKSPACE/scripts/check-ffi-selfcontained.sh" "$FFI_NAME"
            shasum -a 256 "$FFI_NAME" > "$FFI_NAME.sha256"
            echo "FFI_ASSET_PATH=target/${{ matrix.target }}/release/$FFI_NAME" >> $GITHUB_ENV
            echo "FFI_CHECKSUM_PATH=target/${{ matrix.target }}/release/$FFI_NAME.sha256" >> $GITHUB_ENV
          fi

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release

          $ARCHIVE_NAME = "${{ env.BINARY_NAME }}-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$ARCHIVE_NAME/bin"

          # Copy main binary (rift-http-proxy as 'rift.exe')
          Copy-Item "rift-http-proxy.exe" "$ARCHIVE_NAME/bin/${{ env.BINARY_NAME }}.exe"

          # Copy additional binaries
          Copy-Item "rift-lint.exe" "$ARCHIVE_NAME/bin/rift-lint.exe"
          Copy-Item "rift-tui.exe" "$ARCHIVE_NAME/bin/rift-tui.exe"
          Copy-Item "rift-verify.exe" "$ARCHIVE_NAME/bin/rift-verify.exe"

          # Copy docs
          if (Test-Path "../../../README.md") { Copy-Item "../../../README.md" "$ARCHIVE_NAME/" }
          if (Test-Path "../../../LICENSE") { Copy-Item "../../../LICENSE" "$ARCHIVE_NAME/" }
          if (Test-Path "../../../CHANGELOG.md") { Copy-Item "../../../CHANGELOG.md" "$ARCHIVE_NAME/" }

          # Create zip
          Compress-Archive -Path $ARCHIVE_NAME -DestinationPath "$ARCHIVE_NAME.zip"

          # Create checksum
          $hash = (Get-FileHash -Algorithm SHA256 "$ARCHIVE_NAME.zip").Hash.ToLower()
          "$hash  $ARCHIVE_NAME.zip" | Out-File -Encoding utf8 "$ARCHIVE_NAME.zip.sha256"

          echo "ASSET_PATH=target/${{ matrix.target }}/release/$ARCHIVE_NAME.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$ARCHIVE_NAME.zip" >> $env:GITHUB_ENV
          echo "CHECKSUM_PATH=target/${{ matrix.target }}/release/$ARCHIVE_NAME.zip.sha256" >> $env:GITHUB_ENV
          echo "CHECKSUM_NAME=$ARCHIVE_NAME.zip.sha256" >> $env:GITHUB_ENV

          # rift-ffi cdylib as a standalone, classifier-named release asset (issue #205).
          # The Windows cdylib has no 'lib' prefix (rift_ffi.dll); rename to the librift_ffi-* convention.
          $FFI_NAME = "librift_ffi-${{ matrix.classifier }}.dll"
          Copy-Item "rift_ffi.dll" "$FFI_NAME"
          $ffiHash = (Get-FileHash -Algorithm SHA256 "$FFI_NAME").Hash.ToLower()
          "$ffiHash  $FFI_NAME" | Out-File -Encoding utf8 "$FFI_NAME.sha256"
          echo "FFI_ASSET_PATH=target/${{ matrix.target }}/release/$FFI_NAME" >> $env:GITHUB_ENV
          echo "FFI_CHECKSUM_PATH=target/${{ matrix.target }}/release/$FFI_NAME.sha256" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ env.FFI_ASSET_PATH }}
            ${{ env.FFI_CHECKSUM_PATH }}
          retention-days: 1

  # =============================================================================
  # Publish to crates.io
  # =============================================================================
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Workspace package version (inherited by every member via `version.workspace = true`).
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          # Keep internal path-dependency version requirements in lockstep (issue #474): bump the
          # `version = "..."` that follows each `path = "../rift-*"`, so `cargo publish` sees a
          # matching, published version for every internal dependency instead of an unversioned
          # (rejected) or stale-versioned (unresolvable) path dep.
          find crates -name Cargo.toml -exec sed -i -E \
            's|(path = "\.\./rift-[a-z-]+", version = ")[^"]*|\1'"$VERSION"'|g' {} +
          echo "Set workspace + internal dep versions to $VERSION:"
          grep 'version = ' Cargo.toml | head -1
          grep -R 'path = "\.\./rift-' crates/*/Cargo.toml || true
          # Assert the lockstep bump actually covered every internal path dep (issue #474): sed
          # exits 0 even when it matches nothing, so a reformatted dep line could silently keep a
          # stale — but still crates.io-resolvable — version and publish a wrong artifact GREEN.
          # Fail loudly instead if any internal path dep carries a version other than $VERSION.
          STALE=$(grep -RE 'path = "\.\./rift-[a-z-]+"' crates/*/Cargo.toml \
            | grep 'version = "' | grep -v "version = \"$VERSION\"" || true)
          if [ -n "$STALE" ]; then
            echo "::error::internal dependency version(s) not bumped to $VERSION:"
            echo "$STALE"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      # Publish in dependency order: rift-types -> rift-core -> rift-http-proxy (rift-lint is a
      # leaf and independent). Failures are LOUD (issue #474): the old `|| echo` masked a broken
      # rift-http-proxy publish so releases went green while the crate stayed frozen at 0.4.0.
      - name: Publish to crates.io (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          publish_crate() {
            local crate="$1"
            # Idempotent re-runs: skip ONLY if this exact version is already on crates.io. Any
            # real failure (bad manifest, missing owner, unpublished/unresolvable dep) still fails
            # the job loudly — it is not swallowed.
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null 2>&1; then
              echo "${crate} ${VERSION} already on crates.io — skipping"
              return 0
            fi
            echo "Publishing ${crate} ${VERSION}..."
            cargo publish -p "${crate}" --allow-dirty
            # Let crates.io index the new version before a dependent crate tries to resolve it.
            sleep 30
          }
          publish_crate rift-lint
          publish_crate rift-types
          publish_crate rift-core
          publish_crate rift-http-proxy

  # =============================================================================
  # Create GitHub Release
  # =============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      # Issue #459: emit ffi-manifest.json — a {platform, file, sha256, url} map of the librift_ffi
      # cdylibs in this release — so SDK consumers (rift-java natives, rift-go fetcher,
      # spawn-transport downloads) resolve assets from the manifest instead of hardcoding URL
      # patterns. Sourced from the librift_ffi-*.sha256 assets already downloaded above.
      - name: Generate FFI manifest
        run: |
          ./scripts/gen-ffi-manifest.sh "${{ steps.version.outputs.VERSION }}" artifacts ffi-manifest.json
          cat ffi-manifest.json

      # Issue #460: package sdk-conformance-<version>.tar.gz — the corpus every Rift SDK's CI
      # replays over embedded and remote transports (imposter fixtures + `_verify` transcripts +
      # README replay contract), version-locked to this engine release. The corpus is proven to
      # serve + verify on this commit by `tests/corpus_replay.rs`; here we just stamp the version
      # and package it (with a .sha256) so SDKs download the exact fixtures for the engine they pin.
      - name: Generate SDK conformance corpus
        run: |
          ./scripts/gen-sdk-conformance.sh "${{ steps.version.outputs.VERSION }}" \
            "sdk-conformance-${{ steps.version.outputs.VERSION }}.tar.gz"
          ls -l sdk-conformance-*.tar.gz*

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat << 'EOF' > release_notes.md
          ## Rift ${{ steps.version.outputs.VERSION }}

          Rift is a high-performance, Mountebank-compatible HTTP chaos engineering proxy.

          ### Installation

          #### Quick Install (Unix)
          ```bash
          # Download and extract (replace TARGET with your platform)
          curl -LO https://github.com/EtaCassiopeia/rift/releases/download/${{ steps.version.outputs.VERSION }}/rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz
          sudo mv rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu/bin/* /usr/local/bin/
          ```

          #### Using Docker
          ```bash
          # From Docker Hub
          docker pull zainalpour/rift-proxy:${{ steps.version.outputs.VERSION }}
          docker run -p 2525:2525 -p 9090:9090 zainalpour/rift-proxy:${{ steps.version.outputs.VERSION }}

          # Linter image for CI/CD
          docker pull zainalpour/rift-lint:${{ steps.version.outputs.VERSION }}
          docker run --rm -v $(pwd):/imposters zainalpour/rift-lint:${{ steps.version.outputs.VERSION }} .
          ```

          #### Using Cargo
          ```bash
          cargo install rift-http-proxy
          cargo install rift-lint
          ```

          ### Included Binaries

          Each release archive includes all Rift tools:
          - `rift` - HTTP proxy server (Mountebank-compatible)
          - `rift-lint` - Imposter configuration validator
          - `rift-tui` - Terminal UI for managing imposters
          - `rift-verify` - Stub verifier (checks imposters against a running engine)

          ### Available Platforms

          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | Linux (glibc) | x86_64 | `rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz` |
          | Linux (glibc) | ARM64 | `rift-${{ steps.version.outputs.VERSION }}-aarch64-unknown-linux-gnu.tar.gz` |
          | Linux (musl/static) | x86_64 | `rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-musl.tar.gz` |
          | Linux (musl/static) | ARM64 | `rift-${{ steps.version.outputs.VERSION }}-aarch64-unknown-linux-musl.tar.gz` |
          | macOS | Intel (x86_64) | `rift-${{ steps.version.outputs.VERSION }}-x86_64-apple-darwin.tar.gz` |
          | macOS | Apple Silicon (ARM64) | `rift-${{ steps.version.outputs.VERSION }}-aarch64-apple-darwin.tar.gz` |
          | Windows | x86_64 | `rift-${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc.zip` |

          ### Docker Images

          | Image | Description |
          |-------|-------------|
          | `zainalpour/rift-proxy` | Main HTTP proxy server |
          | `zainalpour/rift-lint` | Imposter validator for CI/CD |

          ### Features

          All binaries include:
          - **Rhai scripting** (built-in)
          - **JavaScript scripting** (Boa engine)
          - **Redis backend** for distributed state

          ### Verification

          Each binary has an accompanying `.sha256` checksum file. Verify downloads with:
          ```bash
          shasum -a 256 -c rift-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.gz.sha256
          ```

          ### Mountebank Compatibility

          Rift is API-compatible with Mountebank:
          ```bash
          rift --port 2525
          ```

          ### Documentation

          - [README](https://github.com/EtaCassiopeia/rift#readme)
          - [Mountebank Compatibility](https://github.com/EtaCassiopeia/rift/blob/main/docs/mountebank-compatibility.md)

          EOF

      - name: Create Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Rift ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/**/*.so
            artifacts/**/*.dylib
            artifacts/**/*.dll
            ffi-manifest.json
            sdk-conformance-*.tar.gz
            sdk-conformance-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          find artifacts -type f -name "*.tar.gz" -o -name "*.zip" | while read f; do
            echo "- $(basename $f)" >> $GITHUB_STEP_SUMMARY
          done

  # =============================================================================
  # Publish npm package
  # =============================================================================
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package version
        working-directory: packages/rift-node
        run: |
          # Update version in package.json to match release tag
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: packages/rift-node
        env:
          RIFT_SKIP_BINARY_DOWNLOAD: '1'
        run: npm ci

      - name: Build
        working-directory: packages/rift-node
        run: npm run build

      - name: Run tests (unit only, no binary needed)
        working-directory: packages/rift-node
        run: npm run test:unit

      - name: Publish to npm
        working-directory: packages/rift-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: npm Summary
        run: |
          echo "## npm Package Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** @rift-vs/rift" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install @rift-vs/rift" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Publish Docker images
  # =============================================================================
  publish-docker:
    name: Publish Docker Images
    needs: release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    permissions:
      contents: read
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    secrets: inherit

  # =============================================================================
  # Update Homebrew formula
  # =============================================================================
  # Invoked here (not via update-homebrew.yml's `release:` trigger) because a release created by
  # this workflow's GITHUB_TOKEN does not emit `release: published`. Runs after `release` so the
  # tap formula points at assets that already exist.
  publish-homebrew:
    name: Update Homebrew Formula
    needs: release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    permissions:
      contents: read
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    secrets: inherit
