# The checked-in include/rift_ffi.h is generated with cbindgen 0.29.4 (pinned in ci.yml so the
# verify-ffi-cdylib.sh regenerate-diff is deterministic). Bump both together and regenerate.
language = "C"
header = "/* Rift C-ABI (issues #204, #343). GENERATED by cbindgen — do not edit by hand.\n   Regenerate + verify with scripts/verify-ffi-cdylib.sh. */"
include_guard = "RIFT_FFI_H"
tab_width = 4
style = "type"
cpp_compat = true
no_includes = false

[parse]
parse_deps = false

[export]
item_types = ["functions", "structs", "opaque", "typedefs"]

[fn]
sort_by = "None"

[defines]
